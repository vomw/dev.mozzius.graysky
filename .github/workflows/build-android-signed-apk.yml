name: Build Android Signed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ vars.OWNER || 'mozzius' }}
      APP_ID: ${{ vars.APP_ID || 'dev.mozzius.graysky' }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Expo config inputs
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          REVENUECAT_API_KEY_ANDROID: ${{ secrets.REVENUECAT_API_KEY_ANDROID }}
          REVENUECAT_API_KEY_IOS: ${{ secrets.REVENUECAT_API_KEY_IOS }}
        run: |
          cat > .env <<EOF
          OWNER=${OWNER}
          APP_ID=${APP_ID}
          ANDROID_VERSION_CODE=${ANDROID_VERSION_CODE}
          EOF

          if [ -n "${REVENUECAT_API_KEY_ANDROID}" ]; then
            echo "REVENUECAT_API_KEY_ANDROID=${REVENUECAT_API_KEY_ANDROID}" >> .env
          fi

          if [ -n "${REVENUECAT_API_KEY_IOS}" ]; then
            echo "REVENUECAT_API_KEY_IOS=${REVENUECAT_API_KEY_IOS}" >> .env
          fi

          if [ -n "${GOOGLE_SERVICES_JSON_B64}" ]; then
            printf '%s' "${GOOGLE_SERVICES_JSON_B64}" | base64 --decode > apps/expo/google-services.json
          else
            cp apps/expo/google-services.json.example apps/expo/google-services.json
          fi

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          test -n "${ANDROID_KEYSTORE_B64}"
          printf '%s' "${ANDROID_KEYSTORE_B64}" | base64 --decode > apps/expo/android-signing-key.jks

      - name: Generate Android project
        working-directory: apps/expo
        shell: bash
        run: |
          pnpm exec expo prebuild --platform android --non-interactive --clean

      - name: Build release APK
        working-directory: apps/expo/android
        shell: bash
        run: |
          ./gradlew assembleRelease -x lintVitalAnalyzeRelease

      - name: Sign release APK
        shell: bash
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          unsigned_apk="apps/expo/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          signed_apk="graysky-${{ github.run_number }}-${{ github.sha }}.apk"
          apksigner_path="$(find "${ANDROID_SDK_ROOT}/build-tools" -name apksigner | sort | tail -n 1)"

          test -f "${unsigned_apk}"
          test -n "${apksigner_path}"

          "${apksigner_path}" sign \
            --ks apps/expo/android-signing-key.jks \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "${signed_apk}" \
            "${unsigned_apk}"

          "${apksigner_path}" verify "${signed_apk}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: graysky-signed-apk-${{ github.run_number }}
          path: graysky-${{ github.run_number }}-${{ github.sha }}.apk
          if-no-files-found: error
